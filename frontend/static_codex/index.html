<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raster Explorer</title>
    <meta name="description"
        content="Interactive raster viewer supporting Leaflet and MapLibre GL JS with server-side colormap and mobile map layouts." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>

    <link rel="stylesheet" href="index.css" />
    <link id="theme-link" rel="stylesheet" href="themes/theme_glass.css?v1" />
    <script>
        (function () {
            const savedTheme = localStorage.getItem('map-theme') || 'glass';
            document.getElementById('theme-link').href = `themes/theme_${savedTheme}.css?v1`;
        })();
    </script>
    <script src="config.js"></script>
    <script src="map.js"></script>
    <script src="shared.js"></script>
</head>

<body>
    <div id="map"></div>

    <div id="dev-controls" class="dev-controls">
        <label class="dev-select">
            <span>Layout</span>
            <select id="layout-switcher">
                <option value="layout-1">Layout 1</option>
                <option value="layout-2">Layout 2</option>
                <option value="layout-3">Layout 3</option>
            </select>
        </label>

        <label class="dev-select">
            <span>Theme</span>
            <select id="theme-switcher">
                <optgroup label="Dark Themes">
                    <option value="glass">Glass</option>
                    <option value="dracula">Dracula</option>
                    <option value="nord_frost">Nord Frost</option>
                    <option value="terminal">Terminal</option>
                    <option value="cyber">Cyberpunk</option>
                </optgroup>
                <optgroup label="Light Themes">
                    <option value="nordic_light">Nordic Light</option>
                    <option value="pastel">Pastel Candy</option>
                    <option value="brutalist">Neo-Brutalist</option>
                    <option value="forest">Forest Earth</option>
                    <option value="corporate">Corporate</option>
                </optgroup>
                <optgroup label="Colorblind Friendly Dark">
                    <option value="okabe_ito_dark">Okabe-Ito Dark</option>
                    <option value="deuteranopia">Deuteranopia Dark</option>
                    <option value="protanopia">Protanopia Dark</option>
                    <option value="barrier_free">Barrier-Free Dark</option>
                    <option value="colorblind_cyber">Colorblind Cyber</option>
                </optgroup>
                <optgroup label="Colorblind Friendly Light">
                    <option value="paul_tol_light">Paul Tol Light</option>
                    <option value="tritanopia">Tritanopia Light</option>
                    <option value="achromatopsia">Achromatopsia HC</option>
                    <option value="amber_blue">Safe Amber Blue</option>
                    <option value="safe_turquoise">Safe Turquoise Light</option>
                </optgroup>
            </select>
        </label>
    </div>

    <main id="app-ui" aria-live="polite"></main>
    <div id="drawer-scrim" class="drawer-scrim" hidden></div>
    <aside id="settings-drawer" class="settings-drawer" aria-label="Map settings" hidden></aside>
</body>

</html>
