<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raster Explorer</title>
    <meta name="description"
        content="Interactive raster viewer supporting Leaflet and MapLibre GL JS with server-side colormap and premium UI." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Leaflet Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MapLibre GL JS Assets -->
    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="index.css" />
    <link id="theme-link" rel="stylesheet" href="themes/theme_glass.css?v1" />
    <script>
        (function () {
            const savedTheme = localStorage.getItem('map-theme') || 'glass';
            document.getElementById('theme-link').href = `themes/theme_${savedTheme}.css?v1`;
        })();
    </script>
    <script src="config.js"></script>
</head>

<body>

    <!-- Map container -->
    <div id="map"></div>

    <!-- UI Control Panel -->
    <div id="panel">
        <div class="panel-header">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <h1>Raster Explorer</h1>
                <select id="theme-switcher"
                    style="padding: 4px 8px; font-size: 11px; border-radius: 6px; background: var(--bg-card); color: var(--text-hi); border: 1px solid var(--border-hi); outline: none; cursor: pointer; font-family: inherit;">
                    <optgroup label="Dark Themes">
                        <option value="glass">Glass (Default)</option>
                        <option value="dracula">Dracula</option>
                        <option value="nord_frost">Nord Frost</option>
                        <option value="terminal">Terminal</option>
                        <option value="cyber">Cyberpunk</option>
                    </optgroup>
                    <optgroup label="Light Themes">
                        <option value="nordic_light">Nordic Light</option>
                        <option value="pastel">Pastel Candy</option>
                        <option value="brutalist">Neo-Brutalist</option>
                        <option value="forest">Forest Earth</option>
                        <option value="corporate">Corporate</option>
                    </optgroup>
                    <optgroup label="Colorblind Friendly (Dark)">
                        <option value="okabe_ito_dark">Okabe-Ito Dark</option>
                        <option value="deuteranopia">Deuteranopia Dark</option>
                        <option value="protanopia">Protanopia Dark</option>
                        <option value="barrier_free">Barrier-Free Dark</option>
                        <option value="colorblind_cyber">Colorblind Cyber</option>
                    </optgroup>
                    <optgroup label="Colorblind Friendly (Light)">
                        <option value="paul_tol_light">Paul Tol Light</option>
                        <option value="tritanopia">Tritanopia Light</option>
                        <option value="achromatopsia">Achromatopsia HC</option>
                        <option value="amber_blue">Safe Amber & Blue</option>
                        <option value="safe_turquoise">Safe Turquoise Light</option>
                    </optgroup>
                </select>
            </div>
            
            <p id="engine-desc">Server-side colormap · single tile layer · Leaflet</p>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 8px;">
                <span style="font-size: 10px; color: var(--text-mid); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Map Engine</span>
                <div class="engine-switcher">
                    <button class="engine-btn" data-engine="leaflet" id="engine-leaflet">Leaflet</button>
                    <button class="engine-btn" data-engine="maplibre" id="engine-maplibre">MapLibre</button>
                </div>
            </div>
        </div>

        <div class="panel-body" id="panel-body">
            <!-- Basemap switcher and layer cards dynamically injected here -->
        </div>
    </div>

    <!-- Map Engine Scripts -->
    <script src="leaflet_map.js"></script>
    <script src="maplibre_map.js"></script>
    <script src="shared.js"></script>
</body>

</html>
