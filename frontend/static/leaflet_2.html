<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Raster Explorer</title>
    <meta name="description"
        content="Interactive raster viewer with Leaflet, server-side colormap, basemap switcher, and premium UI." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="leaflet_2.css" />
    <link id="theme-link" rel="stylesheet" href="themes/theme_glass.css?v1" />
    <script>
        (function () {
            const savedTheme = localStorage.getItem('leaflet-theme') || 'glass';
            document.getElementById('theme-link').href = `themes/theme_${savedTheme}.css?v1`;
        })();
    </script>
    <script src="config.js"></script>
</head>

<body>

    <div id="map"></div>



    <div id="panel">
        <div class="panel-header">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <h1>Leaflet Raster Explorer</h1>
                <select id="theme-switcher"
                    style="padding: 4px 8px; font-size: 11px; border-radius: 6px; background: var(--bg-card); color: var(--text-hi); border: 1px solid var(--border-hi); outline: none; cursor: pointer; font-family: inherit;">
                    <optgroup label="Dark Themes">
                        <option value="glass">Glass (Default)</option>
                        <option value="dracula">Dracula</option>
                        <option value="nord_frost">Nord Frost</option>
                        <option value="terminal">Terminal</option>
                        <option value="cyber">Cyberpunk</option>
                    </optgroup>
                    <optgroup label="Light Themes">
                        <option value="nordic_light">Nordic Light</option>
                        <option value="pastel">Pastel Candy</option>
                        <option value="brutalist">Neo-Brutalist</option>
                        <option value="forest">Forest Earth</option>
                        <option value="corporate">Corporate</option>
                    </optgroup>
                    <optgroup label="Colorblind Friendly (Dark)">
                        <option value="okabe_ito_dark">Okabe-Ito Dark</option>
                        <option value="deuteranopia">Deuteranopia Dark</option>
                        <option value="protanopia">Protanopia Dark</option>
                        <option value="barrier_free">Barrier-Free Dark</option>
                        <option value="colorblind_cyber">Colorblind Cyber</option>
                    </optgroup>
                    <optgroup label="Colorblind Friendly (Light)">
                        <option value="paul_tol_light">Paul Tol Light</option>
                        <option value="tritanopia">Tritanopia Light</option>
                        <option value="achromatopsia">Achromatopsia HC</option>
                        <option value="amber_blue">Safe Amber & Blue</option>
                        <option value="safe_turquoise">Safe Turquoise Light</option>
                    </optgroup>
                </select>
            </div>
            <p>Server-side colormap · single tile layer · Leaflet</p>
        </div>
        <div class="panel-body" id="panel-body">
            <!-- Basemap switcher and layer cards injected here -->
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────
        //  CONFIG
        // ─────────────────────────────────────────────
        const TILEJSON_BASE = CONFIG.apiBaseUrl + '/api/raster/WebMercatorQuad/tilejson.json';
        const RASTER_SOURCE_FILE = CONFIG.rasterCog;

        const COLORMAP_PRESETS = {
            viridis: ['#440154', '#472d7b', '#3b528b', '#2c728e', '#21918c', '#28ae80', '#5ec962', '#addc30', '#fde725'],
            plasma: ['#0d0887', '#4b03a1', '#7d03a8', '#a82296', '#cb4679', '#e56b5d', '#f89441', '#fdc527', '#f0f921'],
            magma: ['#000004', '#180f3e', '#440f76', '#721f81', '#9e2f7f', '#cd4071', '#f1605d', '#fd9668', '#fcfdbf'],
            YlGnBu: ['#ffffd9', '#edf8b1', '#c7e9b4', '#7fcdbb', '#41b6c4', '#1d91c0', '#225ea8', '#253494', '#081d58'],
            YlOrRd: ['#ffffcc', '#ffeda0', '#fed976', '#feb24c', '#fd8d3c', '#fc4e2a', '#e31a1c', '#bd0026', '#800026'],
            PuBuGn: ['#fff7fb', '#ece2f0', '#d0d1e6', '#a6bddb', '#67a9cf', '#3690c0', '#02818a', '#016c59', '#014636']
        };

        const layerState = [
            { id: 'Nature', start: 1, preset: 'viridis', visible: true, opacity: 0.9, reverse: false, type: 'category' },
            { id: 'Farm', start: 11, preset: 'YlOrRd', visible: false, opacity: 0.9, reverse: false, type: 'category' },
            { id: 'Parks', start: 21, preset: 'PuBuGn', visible: false, opacity: 0.9, reverse: false, type: 'category' },
            { id: 'Urban', start: 31, preset: 'magma', visible: false, opacity: 0.9, reverse: false, type: 'category' },
            { id: 'Water', start: 200, preset: '#4da6ff', visible: false, opacity: 0.9, reverse: false, type: 'solid' }
        ];

        // ─────────────────────────────────────────────
        //  BASEMAP DEFINITIONS
        // ─────────────────────────────────────────────
        const BASEMAPS = {
            osm: {
                label: 'OpenStreetMap',
                url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                options: {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                    maxZoom: 15
                }
            },
            satellite: {
                label: 'Satellite Hybrid',
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                options: {
                    attribution: '&copy; <a href="https://www.esri.com/">Esri</a> · Sources: Esri, Maxar, Earthstar Geographics',
                    maxZoom: 15
                }
            }
        };

        let activeBasemapKey = 'osm';
        let basemapOpacity = 1.0;

        // ─────────────────────────────────────────────
        //  COLORMAP HELPERS
        // ─────────────────────────────────────────────
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const aInt = Math.round(alpha * 255);
            return [r, g, b, aInt];
        }

        function buildGradient(preset, reverse) {
            let colors = [...COLORMAP_PRESETS[preset]];
            if (reverse) colors = [...colors].reverse();
            return `linear-gradient(to right, ${colors.join(', ')})`;
        }

        function getCombinedColormapJson() {
            const cmap = {};
            layerState.forEach(layer => {
                if (!layer.visible) return;

                if (layer.type === 'solid') {
                    cmap[layer.start] = hexToRgba(layer.preset, layer.opacity);
                } else {
                    let colors = [...COLORMAP_PRESETS[layer.preset]];
                    if (layer.reverse) colors.reverse();
                    for (let i = 0; i < 9; i++) {
                        cmap[layer.start + i] = hexToRgba(colors[i], layer.opacity);
                    }
                }
            });
            return JSON.stringify(cmap);
        }

        // ─────────────────────────────────────────────
        //  MAP INIT
        // ─────────────────────────────────────────────
        const map = L.map('map', {
            zoomControl: false
        }).setView([51.0, 13.3], 8);

        // Add zoom control top-left
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Basemap layer (start with OSM)
        let basemapLayer = L.tileLayer(BASEMAPS.osm.url, BASEMAPS.osm.options).addTo(map);

        // Data layer
        let dataLayer = null;

        function switchBasemap(key) {
            if (key === activeBasemapKey) return;
            activeBasemapKey = key;

            map.removeLayer(basemapLayer);
            const def = BASEMAPS[key];
            basemapLayer = L.tileLayer(def.url, def.options).addTo(map);
            basemapLayer.setOpacity(basemapOpacity);

            // Re-add data layer on top
            if (dataLayer) {
                dataLayer.bringToFront();
            }

            // Update button states
            document.querySelectorAll('.basemap-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.key === key);
            });
        }

        // ─────────────────────────────────────────────
        //  TILE LAYER UPDATE
        // ─────────────────────────────────────────────
        let debounceTimer;
        function updateDataLayer() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                const url = new URL(TILEJSON_BASE);
                url.searchParams.set('raster', RASTER_SOURCE_FILE);
                url.searchParams.set('colormap', getCombinedColormapJson());

                try {
                    const res = await fetch(url.toString());
                    const tj = await res.json();

                    if (!tj.tiles || tj.tiles.length === 0) return;

                    let tileUrl = tj.tiles[0];
                    
                    if (!dataLayer) {
                        dataLayer = L.tileLayer(tileUrl, {
                            maxNativeZoom: tj.maxzoom || 12, // highest zoom requested from TiTiler
                            maxZoom: 15,        // highest zoom allowed in Leaflet
                            updateWhenZooming: false,
                            // Only fetch new tiles once the map has stopped moving.
                            updateWhenIdle: true,
                            // Keep 2 tile-widths of buffer around the viewport so
                            // panning feels instant without extra server requests.
                            keepBuffer: 2,
                            // Minimum ms between tile-URL updates on move.
                            // updateInterval: 200,
                            zoomOffset: -1,
                            tileSize: 512,
                            minZoom: tj.minzoom
                        }).addTo(map);
                    } else {
                        dataLayer.setUrl(tileUrl);
                    }
                } catch (e) {
                    console.error("Error fetching TileJSON:", e);
                }
            // 300 ms debounce: prevents hammering TiTiler while sliders
            // are still moving or layers are being toggled rapidly.
            }, 50);
        }

        // ─────────────────────────────────────────────
        //  UI BUILDER
        // ─────────────────────────────────────────────
        function buildPanel() {
            const container = document.getElementById('panel-body');
            container.innerHTML = '';

            // ── Basemap Section ──
            const basemapSection = document.createElement('div');
            basemapSection.innerHTML = `<div class="section-label">Basemap</div>`;
            container.appendChild(basemapSection);

            const cogSvg = `<svg class="settings-cog" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;

            const basemapCard = document.createElement('div');
            basemapCard.className = 'basemap-card';
            basemapCard.innerHTML = `
                <div class="basemap-header" id="basemap-header">
                    <svg style="width:16px;height:16px;color:var(--accent);flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    <span class="basemap-label">Basemap</span>
                    ${cogSvg}
                </div>
                <div class="basemap-body">
                    <div class="basemap-options">
                        <button class="basemap-btn active" data-key="osm" id="basemap-osm">OSM</button>
                        <button class="basemap-btn" data-key="satellite" id="basemap-satellite">Satellite</button>
                    </div>
                    <div style="padding: 4px 14px 12px;">
                        <div class="ctrl-row">
                            <div class="ctrl-label">
                                <span>Opacity</span>
                                <span class="val" id="basemap-op-val">${Math.round(basemapOpacity * 100)}%</span>
                            </div>
                            <input type="range" id="basemap-opacity" min="0" max="1" step="0.01" value="${basemapOpacity}" />
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(basemapCard);

            // Basemap header toggle
            document.getElementById('basemap-header').addEventListener('click', () => {
                basemapCard.classList.toggle('open');
            });

            // Basemap button events
            basemapCard.querySelectorAll('.basemap-btn').forEach(btn => {
                btn.addEventListener('click', () => switchBasemap(btn.dataset.key));
            });

            // Basemap opacity slider
            document.getElementById('basemap-opacity').addEventListener('input', (e) => {
                basemapOpacity = parseFloat(e.target.value);
                document.getElementById('basemap-op-val').textContent = `${Math.round(basemapOpacity * 100)}%`;
                basemapLayer.setOpacity(basemapOpacity);
            });

            // ── Layers Section ──
            const layerSection = document.createElement('div');
            layerSection.innerHTML = `<div class="section-label">Data Layers</div>`;
            container.appendChild(layerSection);

            // ── Layer Cards ──
            layerState.forEach((layer) => {
                const card = document.createElement('div');
                card.className = `layer-card${layer.visible ? '' : ' inactive'}`;
                card.id = `card-${layer.id}`;

                let bodyHtml = '';
                if (layer.type === 'category') {
                    const schemeButtons = Object.keys(COLORMAP_PRESETS)
                        .map(k => `<button class="scheme-btn${k === layer.preset ? ' active' : ''}" data-scheme="${k}" data-layer="${layer.id}" title="${k}" style="background: ${buildGradient(k, false)};"></button>`)
                        .join('');

                    bodyHtml = `
                        <div class="ctrl-row">
                            <div class="ctrl-label">
                                <span>Opacity</span>
                                <span class="val" id="opval-${layer.id}">${Math.round(layer.opacity * 100)}%</span>
                            </div>
                            <input type="range" id="op-${layer.id}" min="0" max="1" step="0.01" value="${layer.opacity}" />
                        </div>

                        <div class="ctrl-row">
                            <div class="ctrl-label"><span>Color Scheme</span></div>
                            <div class="scheme-active-row">
                                <div class="scheme-active-bar" id="bar-${layer.id}" style="background: ${buildGradient(layer.preset, layer.reverse)};"></div>
                                <button class="btn-reverse${layer.reverse ? ' active' : ''}" id="rev-${layer.id}" title="Reverse palette">
                                    ⇄ Rev
                                </button>
                            </div>
                            <div class="scheme-grid" id="schemes-${layer.id}">
                                ${schemeButtons}
                            </div>
                        </div>
                    `;
                } else if (layer.type === 'solid') {
                    bodyHtml = `
                        <div class="ctrl-row">
                            <div class="ctrl-label">
                                <span>Opacity</span>
                                <span class="val" id="opval-${layer.id}">${Math.round(layer.opacity * 100)}%</span>
                            </div>
                            <input type="range" id="op-${layer.id}" min="0" max="1" step="0.01" value="${layer.opacity}" />
                        </div>

                        <div class="ctrl-row">
                            <div class="ctrl-label"><span>Water Color</span></div>
                            <div class="scheme-row">
                                <input type="color" id="color-${layer.id}" value="${layer.preset}" style="width: 100%; height: 34px; background: transparent; border: 1px solid var(--border-hi); border-radius: 6px; padding: 2px; cursor: pointer;" />
                            </div>
                        </div>
                    `;
                }

                const colors = COLORMAP_PRESETS[layer.preset] || layer.preset;
                const topColor = Array.isArray(colors) ? (layer.reverse ? colors[colors.length - 1] : colors[0]) : colors;

                card.innerHTML = `
                    <div class="layer-header" id="hdr-${layer.id}">
                        <span class="layer-dot" id="dot-${layer.id}" style="color:${topColor}; background:${topColor};"></span>
                        <span class="layer-name">${layer.id}</span>
                        <label class="toggle" title="Toggle visibility">
                            <input type="checkbox" id="vis-${layer.id}" ${layer.visible ? 'checked' : ''} />
                            <span class="toggle-track"></span>
                        </label>
                        <svg class="settings-cog" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </div>
                    <div class="layer-body">
                        ${bodyHtml}
                    </div>
                `;

                container.appendChild(card);

                // ── EVENTS ──

                // Expand / collapse only with cog, or toggle visibility with general click
                document.getElementById(`hdr-${layer.id}`).addEventListener('click', (e) => {
                    if (e.target.closest('.settings-cog')) {
                        card.classList.toggle('open');
                        return;
                    }
                    if (e.target.closest('.toggle')) {
                        return;
                    }
                    // Toggle the visibility check programmatically
                    const checkbox = document.getElementById(`vis-${layer.id}`);
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                });

                // Visibility toggle
                document.getElementById(`vis-${layer.id}`).addEventListener('change', (e) => {
                    layer.visible = e.target.checked;
                    card.classList.toggle('inactive', !layer.visible);
                    updateDataLayer();
                });

                // Opacity slider
                document.getElementById(`op-${layer.id}`).addEventListener('input', (e) => {
                    layer.opacity = parseFloat(e.target.value);
                    document.getElementById(`opval-${layer.id}`).textContent = `${Math.round(layer.opacity * 100)}%`;
                    updateDataLayer();
                });

                if (layer.type === 'category') {
                    // Color scheme buttons
                    document.getElementById(`schemes-${layer.id}`).querySelectorAll('.scheme-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            layer.preset = btn.dataset.scheme;
                            // Update active state
                            document.getElementById(`schemes-${layer.id}`).querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            updateColorbar(layer);
                            updateDataLayer();
                        });
                    });

                    // Reverse button
                    document.getElementById(`rev-${layer.id}`).addEventListener('click', () => {
                        layer.reverse = !layer.reverse;
                        document.getElementById(`rev-${layer.id}`).classList.toggle('active', layer.reverse);
                        updateColorbar(layer);
                        updateDataLayer();
                    });
                } else if (layer.type === 'solid') {
                    // Color picker
                    document.getElementById(`color-${layer.id}`).addEventListener('input', (e) => {
                        layer.preset = e.target.value;
                        const dot = document.getElementById(`dot-${layer.id}`);
                        dot.style.color = layer.preset;
                        dot.style.background = layer.preset;
                        updateDataLayer();
                    });
                }
            });
        }

        function updateColorbar(layer) {
            const colors = COLORMAP_PRESETS[layer.preset];
            if (!colors) return; // solid type — no ramp to update

            const bar = document.getElementById(`bar-${layer.id}`);
            if (bar) {
                bar.style.background = buildGradient(layer.preset, layer.reverse);
            }

            // Update dot to highest value of the current ramp
            const topColor = layer.reverse ? colors[colors.length - 1] : colors[0];
            const dot = document.getElementById(`dot-${layer.id}`);
            if (dot) {
                dot.style.color = topColor;
                dot.style.background = topColor;
            }
        }

        // ─────────────────────────────────────────────
        //  STARTUP
        // ─────────────────────────────────────────────
        buildPanel();
        updateDataLayer();

        // Theme Switcher Initialization
        const themeSwitcher = document.getElementById('theme-switcher');
        const savedTheme = localStorage.getItem('leaflet-theme') || 'glass';
        themeSwitcher.value = savedTheme;

        themeSwitcher.addEventListener('change', (e) => {
            const theme = e.target.value;
            document.getElementById('theme-link').href = `themes/theme_${theme}.css`;
            localStorage.setItem('leaflet-theme', theme);
        });
    </script>
</body>

</html>
