# Configuration for the multi-country raster (raster/eu/create_eu_raster.sh).
# Shared settings (CRS, resolution, GDAL options, ...) are inherited from
# raster/raster.conf; this file only declares the multi-country specifics.

# Countries composing the mosaic. Each is processed individually on its own
# buffered extent with the existing per-area scripts, then merged. Names must be
# geocodable by OSMnx (Nominatim). Add more here later.
COUNTRIES=(germany switzerland austria)

# Name of the combined product. Drives output and dissolved-boundary naming:
#   out/<OUTPUT_AREA>_20m_v<N>.tif   and   input/bounds/<OUTPUT_AREA>.gpkg
OUTPUT_AREA="dach"

# Cross-border buffer (meters, EPSG:3035) added to each country's processing
# extent so the road-smoothing kernel in osm_rasterize_roads.sh sees the
# neighbours' roads. Must exceed that kernel's footprint (a few hundred meters);
# the buffer ring is discarded by the final clip to the exact DACH boundary.
BOUNDS_BUFFER_M=1000

# Snap the buffered bbox to this grid (meters) so every country shares one global
# pixel grid in EPSG:3035 and the tiles mosaic seamlessly. Keep it a multiple of
# the coarsest resolution you intend to derive (100 m covers the coarse tiers).
BOUNDS_SNAP_M=100

# Europe-wide source PBF the one-time extract helper cuts each country out of.
# Place it at raster/input/osm/<EUROPE_PBF_NAME> (download once from Geofabrik:
# https://download.geofabrik.de/europe-latest.osm.pbf).
EUROPE_PBF_NAME="europe-latest.osm.pbf"
