AREA="germany"
OVERWRITE="--overwrite"

# Shared projection settings.
TARGET_EPSG="EPSG:3035"
WEB_EPSG="EPSG:3857"

# Shared raster settings.
RASTER_RESOLUTION="20,20"
SMOOTH_RESOLUTION="100,100"
RASTER_NODATA="255"
RASTER_DATA_TYPE="Byte"
RASTERIZE_DATA_TYPE="byte"
GTIFF_FORMAT="GTiff"

# Shared raster bounds in TARGET_EPSG.
# Keep these aligned to 100m boundaries to avoid clipping artifacts when
# combining 20m and 100m rasters.
MINX="4031300"
MINY="2684000"
MAXX="4672600"
MAXY="3556600"

GTIFF_WRITE_OPTIONS=(
  "--of=GTiff"
  "--co=TILED=YES"
  "--co=COMPRESS=DEFLATE"
  "--co=PREDICTOR=2"
  "--co=BIGTIFF=IF_SAFER"
)

GTIFF_CREATION_OPTIONS=(
  "--creation-option=TILED=YES"
  "--creation-option=COMPRESS=DEFLATE"
  "--creation-option=PREDICTOR=2"
  "--creation-option=BIGTIFF=IF_SAFER"
)

GTIFF_CO_OPTIONS=(
  "--co=TILED=YES"
  "--co=COMPRESS=DEFLATE"
  "--co=PREDICTOR=2"
  "--co=BIGTIFF=IF_SAFER"
)

COG_WRITE_OPTIONS=(
  "--co=COMPRESS=ZSTD"
  "--co=PREDICTOR=NO"
  "--co=OVERVIEWS=AUTO"
  "--co=RESAMPLING=NEAREST"
  "--co=BIGTIFF=IF_SAFER"
)
