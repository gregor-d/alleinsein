services:
  tiler:
    container_name: tiler
    build:
      context: .
      dockerfile: dockerfile/Dockerfile
    image: base_alleinsein
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "8000:8000"
    # use ./backend/.env.example to create env-file for dev-mode
    env_file:
      - path: ./.env
        required: false
    environment:
      # GDAL config
      - CPL_TMPDIR=/tmp
      - GDAL_CACHEMAX=256
      - GDAL_INGESTED_BYTES_AT_OPEN=32768
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=268435456
      # - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      # - GDAL_HTTP_MULTIPLEX: "YES"
      # - GDAL_HTTP_VERSION: "2"
      # - PYTHONWARNINGS=ignore

    volumes:
      - ./raster/out:/raster/out
      # Dev: also bind-mount the source so edits are picked up without a rebuild.
      # The mount shadows the image's baked-in /backend (prod uses the baked copy).
      # - ./backend:/backend
      # On Docker Desktop (Windows) file-watch events may not cross into the
      # container; if --reload doesn't fire on save, force polling:
      # environment:
      #   - WATCHFILES_FORCE_POLLING=true

    # Start command is the image default (see CMD in dockerfile/Dockerfile).
    # Override for development (auto-reload, single worker) with:
    # command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips "*"

  smoke-test:
    image: base_alleinsein
    depends_on:
      - tiler
    restart: "no"
    # Wait for the tiler to answer, then run the smoke test against it. smoke-test.sh
    # itself has no retry, so poll /healthz first to avoid a startup race.
    command:
      - bash
      - -c
      - |
        sleep 3
        for _ in $(seq 1 60); do
          curl -fsS http://tiler:8000/healthz && break
          sleep 1
        done
        exec bash /scripts/smoke-test.sh http://tiler:8000
