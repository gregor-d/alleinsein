services:
  tiler:
    container_name: tiler
    build:
      context: .
      dockerfile: dockerfile/Dockerfile
    image: base_alleinsein
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # GDAL config
      - CPL_TMPDIR=/tmp
      - GDAL_CACHEMAX=256
      # - GDAL_CACHEMAX=512
      - GDAL_INGESTED_BYTES_AT_OPEN=32768
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      # - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      # GDAL_HTTP_MULTIPLEX: "YES"
      # GDAL_HTTP_VERSION: "2"
      # - PYTHONWARNINGS=ignore
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=268435456 
      # - VSI_CACHE_SIZE=518435456 
      # App overrides here win over backend/${APP_ENV:-prod}.env.
      # APP_ENABLE_DOCS: "false"
      # APP_ALLOWED_TMS: "WebMercatorQuad"

    volumes:
      - ./backend:/backend
      - ./raster/out:/raster/out

    # run uvicorn app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips "*"

    healthcheck:
      test: ["CMD", "bash", "/scripts/smoke-test.sh"]
      interval: 120s
      timeout: 10s
      retries: 2
      start_period: 15s
